
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Атмосфера ХМ | Апартаменты посуточно в Ханты-Мансийске</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --dark-blue: #081C2E;
            --gold: #C69A4C;
            --white: #FFFFFF;
            --soft-bg: #f4f4f4;
            --max-color: #0078D4;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; background: var(--white); }
        header { background: var(--dark-blue); padding: 15px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--gold); }
        .container { width: 90%; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo-box { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--gold); font-weight: bold; font-size: 20px; }
        .logo-box img { height: 50px; display: block; }
        .hero { height: 80vh; background: linear-gradient(rgba(8,28,46,0.7), rgba(8,28,46,0.7)), url('https://images.unsplash.com/photo-1522770179533-24471fcdba45?auto=format&fit=crop&w=1350&q=80') center/cover; display: flex; align-items: center; justify-content: center; text-align: center; color: var(--white); padding: 20px; }
        .hero-content h1 { font-size: 3rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .hero-content h1 span { color: var(--gold); }
        .hero-content p { font-size: 1.2rem; margin-bottom: 30px; opacity: 0.9; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .btn { display: inline-block; padding: 18px 35px; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; text-transform: uppercase; font-size: 14px; width: 280px; text-align: center; }
        .btn-tg { background: var(--gold); color: white; }
        .btn-max { background: var(--max-color); color: white; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); opacity: 0.9; }
        .footer { background: var(--dark-blue); color: white; padding: 50px 0; text-align: center; border-top: 1px solid var(--gold); }
        .footer p { margin-bottom: 20px; opacity: 0.8; }
        .contact-link { color: var(--gold); text-decoration: none; font-size: 1.5rem; font-weight: bold; }
        @media (max-width: 600px) {
            .hero-content h1 { font-size: 2rem; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <a href="#" class="logo-box">
                <img src="logo.png" alt="Логотип">
                <span>ATMOSFERA XM</span>
            </a>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1><span>ATMOSFERA</span> XM</h1>
            <p>Апартаменты посуточно в Ханты-Мансийске</p>
            <div class="btn-group">
                <a href="https://t.me/evgeniigroom" class="btn btn-tg"><i class="fab fa-telegram"></i> Написать в Telegram</a>
                <a href="https://t.me/evgeniigroom" class="btn btn-max">Забронировать в MAX</a>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container" style="display:block;">
            <p>По всем вопросам звоните напрямую:</p>
            <a href="tel:+79000000000" class="contact-link">+7 (900) 000-00-00</a>
            <p style="margin-top:30px; font-size: 12px;">© 2024 Atmosfera XM. Уют и комфорт в каждой детали.</p>
        </div>
    </footer>

</body>
</html>
