<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmosfera XM | Связь</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark: #081C2E; --gold: #C69A4C; --tg-blue: #2481cc; --max-color: #5d5fef; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; text-align: center; min-height: 100vh; display: flex; flex-direction: column; }
        header { padding: 20px; border-bottom: 1px solid var(--gold); }
        .logo-box { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .logo-box img { height: 40px; width: auto; }
        .hero { flex-grow: 1; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .contact-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 18px; border: 1px solid rgba(198,154,76,0.4); margin-bottom: 20px; width: 100%; max-width: 340px; }
        .phone-num { display: block; font-size: 20px; font-weight: bold; color: var(--gold); margin-bottom: 15px; text-decoration: none; }
        .btn-row { display: flex; gap: 10px; }
        .btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 5px; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 12px; color: white; transition: 0.2s; text-transform: uppercase; }
        .btn-tg { background: var(--tg-blue); }
        .btn-max { background: var(--max-color); }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
        footer { padding: 20px; opacity: 0.5; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="logo.png" alt="Logo">
            <span style="color:var(--gold); font-weight:bold;">ATMOSFERA XM</span>
        </div>
    </header>

    <section class="hero">
        <div class="contact-card">
            <a href="tel:+79384356588" class="phone-num">+7 (938) 435-65-88</a>
            <div class="btn-row">
                <a href="https://t.me/+79384356588" target="_blank" class="btn btn-tg">
                    <i class="fab fa-telegram-plane"></i> TELEGRAM
                </a>
                <a href="https://max.ru/u/f9LHodD0cOLrSVoXatsW2OO2oqVHK40FFUOZ_x4ywdA5XPIcgsbCeRgs1X8" target="_blank" class="btn btn-max">
                    <i class="fas fa-comment"></i> MAX
                </a>
            </div>
        </div>

        <div class="contact-card">
            <a href="tel:+79022733569" class="phone-num">+7 (902) 273-35-69</a>
            <div class="btn-row">
                <a href="https://t.me/+79022733569" target="_blank" class="btn btn-tg">
                    <i class="fab fa-telegram-plane"></i> TELEGRAM
                </a>
                <a href="https://max.ru/u/f9LHodD0cOLrSVoXatsW2OO2oqVHK40FFUOZ_x4ywdA5XPIcgsbCeRgs1X8" target="_blank" class="btn btn-max">
                    <i class="fas fa-comment"></i> MAX
                </a>
            </div>
        </div>
    </section>

    <footer>
        © 2024 Atmosfera XM

</body>
</html>
