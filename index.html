<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmosfera XM | Апартаменты в Ханты-Мансийске</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark: #081C2E; --gold: #C69A4C; --white: #FFFFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; text-align: center; min-height: 100vh; display: flex; flex-direction: column; }
        header { padding: 20px; border-bottom: 1px solid var(--gold); background: var(--dark); }
        .logo-text { color: var(--gold); font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .hero { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; background: linear-gradient(rgba(8,28,46,0.85), rgba(8,28,46,0.85)), url('https://images.unsplash.com/photo-1522770179533-24471fcdba45?auto=format&fit=crop&w=1350&q=80') center/cover; }
        h1 { font-size: 36px; margin-bottom: 10px; text-transform: uppercase; }
        h1 span { color: var(--gold); }
        p { font-size: 18px; margin-bottom: 35px; opacity: 0.9; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 20px; text-decoration: none; border-radius: 12px; font-weight: bold; transition: 0.3s; text-transform: uppercase; font-size: 14px; color: white; border: none; cursor: pointer; }
        .btn-tg { background: var(--gold); }
        .btn-max { background: #0078D4; }
        .btn:hover { transform: scale(1.03); filter: brightness(1.1); }
        footer { padding: 30px; background: var(--dark); border-top: 1px solid rgba(198, 154, 76, 0.3); }
        .phone-link { color: var(--gold); text-decoration: none; font-size: 20px; font-weight: bold; display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="logo-text">ATMOSFERA XM</div>
    </header>

    <section class="hero">
        <h1><span>ATMOSFERA</span> XM</h1>
        <p>Апартаменты бизнес-класса в Ханты-Мансийске</p>
        
        <div class="btn-group">
            <a href="https://t.me/evgeniigroom" target="_blank" class="btn btn-tg">
                <i class="fab fa-telegram-plane"></i> НАПИСАТЬ В TELEGRAM
            </a>

            <a href="https://t.me/evgeniigroom" target="_blank" class="btn btn-max">
                <i class="fas fa-calendar-check"></i> ЗАБРОНИРОВАТЬ В MAX
            </a>
        </div>
    </section>

    <footer>
        <p>Связаться напрямую:</p>
        <a href="tel:+79000000000" class="phone-link">+7 (900) 000-00-00</a>
    </footer>
</body>
</html>
